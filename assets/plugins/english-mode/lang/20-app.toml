# app.rs (メニュー・ツールバー・設定ウィンドウ・ダイアログ・トースト) の辞書。
# 形式: "日本語原文" = "English" / プレースホルダ {name} は訳文にもそのまま残す。

" 秒" = " s"
"OFF にすると指揮だけ止まります。決定論的な見張りは動き続けます" = "Turning this off stops only the commanding. The deterministic watchdog keeps running"
"{label} — 選べません" = "{label} — not selectable"
"{title}（未起動）" = "{title} (not running)"
"✅ 指揮官: {icon} {title}  (#{id})" = "✅ Commander: {icon} {title}  (#{id})"
"このセッションが `@対象: 指示` (全員へは `@all:`) と書くと、その内容が 📮 通知としてユーザーへ届きます。エージェントの入力欄へ自動で書き込むことはありません" = "When this session writes `@target: instruction` (`@all:` for everyone), it reaches you as a 📮 notification. Nothing is ever typed into an agent's input box automatically"
"指揮官の指示 (全員宛): {body}" = "Commander's instruction (to everyone): {body}"
"指揮官の指示 ({title} 宛): {body}" = "Commander's instruction (to {title}): {body}"
"なし（監視のみ・指揮しない）" = "None (watch only, no commanding)"
"指揮を有効にする" = "Enable commanding"
"指揮官: なし（決定論的な見張りだけが動いています）" = "Commander: none (only the deterministic watchdog is running)"
"指揮官セッション『{title}』を待っています — 同じ名前のセッションが起動すると指揮を始めます" = "Waiting for commander session \"{title}\" — commanding starts when a session with this name is launched"
"指揮官セッションを待っています — 選んだ CLI でセッションを起動すると指揮を始めます" = "Waiting for a commander session — launch a session with the chosen CLI to start commanding"
"決定論的な見張り (停滞・ループ・エラー多発の検知) は、この設定に関わらず常に動き、異常はここと通知で知らせます。ここではいま起動しているエージェントの中からどれでも 1 体を『指揮官』に指名できます (作業の途中でもいつでも交代できます)。指揮官が `@対象: 指示` (全員へは `@all:`) と書くと、その内容が **📮 通知** としてユーザーへ届きます。どのエージェントの入力欄にも自動では書き込みません — 指示を実際に流すかはユーザーが決めます (Cockpit の一斉送信や各端末への手入力で)。停止・再起動などの破壊的な操作を自動でエージェントへ投げることもしません。指名したエージェントは普通の作業にもそのまま使えますし、そのセッション自身も見張りの対象です。" = "The deterministic watchdog (stall / loop / error-burst detection) always runs regardless of this setting, and reports anomalies here and via notifications. Here you can appoint any one of the currently running agents as the commander (you can switch at any time, even mid-work). When the commander writes `@target: instruction` (`@all:` for everyone), it reaches you as a **📮 notification**. Nothing is ever typed into any agent's input box automatically — you decide whether to actually relay the instruction (via the Cockpit broadcast or by typing into a terminal yourself). Destructive operations such as stop or restart are never sent to agents automatically either. The appointed agent remains usable for normal work, and its own session is watched too."
"終了しています (再起動すると選べます)" = "Exited (restart it to make it selectable)"
