"💡 スーパーエージェント (指揮役)" = "💡 Super agent (commander)"
"🔌 {name} を{verb}にしました" = "🔌 {name} is now {verb}"
"素のシェルは指揮官にできません (画面のエコーを @指示 と誤検出しやすいためです)" = "A plain shell cannot be the commander (echoed output is easily misread as an @instruction)"

