# ── orchestration.rs: トースト ───────────────────────────────────────

"タスク #{tid} は {name} に割り当てましたが、本文を送れませんでした: {reason}" = "Task #{tid} was assigned to {name}, but the body could not be sent: {reason}"
"📋 タスク #{tid}「{title}」を {name} に割り当てました (相手が待機状態になり次第、本文を送ります)" = "📋 Task #{tid} \"{title}\" assigned to {name} (the body will be sent once it is idle)"
"📋 タスク #{tid} を割り当てられません: {reason}" = "📋 Cannot assign task #{tid}: {reason}"
"📋 タスク #{tid} を {name} へ渡し直しました" = "📋 Task #{tid} reassigned to {name}"
"📋 タスク #{tid} の再割り当てを断りました: {reason}" = "📋 Refused to reassign task #{tid}: {reason}"
"✅ タスク #{tid} を完了にしました" = "✅ Task #{tid} marked as done"
"⚠ タスク #{tid} を失敗にしました" = "⚠ Task #{tid} marked as failed"
"📮 #{id} を {dest} へ送りました" = "📮 Sent #{id} to {dest}"
"📮 #{id} は届け先がいませんでした" = "📮 #{id} had no recipients"
"📮 #{id} を {delivered_to} 件へ一斉送信しました" = "📮 Broadcast #{id} to {delivered_to} recipients"
"📮 {dest} への送信は届きません: {reason}" = "📮 Message to {dest} will not be delivered: {reason}"
"🔁 タスク #{tid} を {name} へ引き継ぎました ({reason})" = "🔁 Task #{tid} handed over to {name} ({reason})"
"🛑 タスク #{tid} は引き渡しません: 前任 session:{previous} の停止が未確認です" = "🛑 Task #{tid} will not be handed over: previous holder session:{previous} is not confirmed stopped"
"📮 {name} の発信を破棄: 宛先「{target}」が見つかりません" = "📮 Dropped outbound message from {name}: target \"{target}\" not found"
"📮 {name} の発信を抑制: {window} あたり {per} 通の上限に達しました" = "📮 Throttled outbound from {name}: reached the limit of {per} messages per {window}"

